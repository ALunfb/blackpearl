name: Update CSFloat Data

on:
  # Scheduled runs disabled — fetch now runs on the Droplet every 30 minutes.
  # This workflow can still be manually triggered from the GitHub UI as a backup.
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch CSFloat data
        env:
          CSFLOAT_API_KEY: ${{ secrets.CSFLOAT_API_KEY }}
        run: node fetch-data.mjs

      - name: Install dependencies
        run: npm install

      - name: Generate OG image
        continue-on-error: true
        run: node generate-og-image.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/listings.json data/price-history.json data/listings-tracker.json brand-assets/og-image.png
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update listings data (automated)"
          git push
